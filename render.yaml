services:
  - type: web
    name: palpite-copa-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: PORT
        value: 3333

  - type: web
    name: palpite-copa-frontend
    runtime: static
    rootDir: frontend
    buildCommand: ""
    staticPublishPath: .
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
